<form method="post" 
      hx-post="{% url 'smart-reminder-modal' %}" 
      hx-target="#modal-content" 
      hx-swap="innerHTML"
      hx-indicator="#btn-generate"> {% csrf_token %}
  
  <div class="modal-header border-0">
    <div class="w-100">
      <h5 class="modal-title text-gradient d-flex align-items-center">
        <i class="bi bi-magic me-2"></i> Smart Reminder Assistant
      </h5>
      <p class="text-muted small mb-0">Describe your reminder in natural language</p>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>
  
  <div class="modal-body py-3">
    {% if error_message %}
      <div class="alert alert-danger d-flex align-items-start" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2 mt-1"></i>
        <div>{{ error_message }}</div>
      </div>
    {% endif %}

    <div class="form-floating">
      <textarea name="input" class="form-control" 
                placeholder="e.g., Remind me to take medicine every night at 9 PM in a gentle tone"
                style="height: 120px"
                id="smart-input"
                required>{{ input_value|default:'' }}</textarea>
      <label>Describe your reminder...</label>
    </div>
    <div class="d-flex align-items-center mt-2">
      <i class="bi bi-lightbulb text-warning me-2"></i>
      <small class="text-muted">e.g, "Remind me to take medicine every night at 9 PM in a gentle tone"</small>
    </div>
  </div>
  
  <div class="modal-footer border-0 d-flex justify-content-between">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
      Cancel
    </button>

    <button type="submit" id="btn-generate" class="btn btn-primary btn-glow position-relative">
      
      <span class="generating-indicator position-absolute top-50 start-50 translate-middle">
        <span class="spinner-border spinner-border-sm me-1" role="status"></span> Generating
      </span>
      
      <span class="generating-content">
        <i class="bi bi-stars me-1"></i> Generate
      </span>
    </button>
  </div>
</form>

<style>
  /* Modal styling */
  .modal-header .text-gradient {
    background: linear-gradient(90deg, #4e54c8, #8f94fb);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .modal-content {
    border: none;
    border-radius: 12px;
    overflow: hidden;
  }
  
  [data-bs-theme="dark"] .modal-content {
    background-color: #2a2a2a;
  }
  
  /* --- HTMX LOADING STATE LOGIC --- */

  /* 1. Default State */
  .generating-indicator {
    opacity: 0;
    pointer-events: none; /* Prevents spinner from blocking clicks/hover when hidden */
    transition: opacity 0.2s ease;
    width: 100%; /* Ensures text doesn't wrap awkwardly */
    text-align: center;
  }

  .generating-content {
    opacity: 1;
    transition: opacity 0.2s ease;
  }

  /* 2. Loading State (Applied when HTMX adds .htmx-request to the BUTTON) */
  
  /* Show Spinner */
  #btn-generate.htmx-request .generating-indicator {
    opacity: 1;
  }
  
  /* Hide Content */
  #btn-generate.htmx-request .generating-content {
    opacity: 0;
  }
  
  /* --- END LOADING LOGIC --- */
  
  /* Textarea styling */
  .form-control {
    border-radius: 8px;
    padding: 1rem;
  }
  
  .form-floating label {
    padding: 1rem;
  }
</style>

<script>
document.addEventListener('htmx:afterRequest', function(evt) {
  // Check if the request originated from our button
  if (evt.detail.elt.id === 'btn-generate') {
    // Scroll to top of modal body
    const modalBody = document.querySelector('.modal-body');
    if(modalBody) modalBody.scrollTop = 0;
  }
});

document.addEventListener('submit', function(evt) {
  const form = evt.target;
  if (!form || form.getAttribute('hx-post') !== "{% url 'smart-reminder-modal' %}") {
    return;
  }

  const inputEl = form.querySelector('#smart-input');
  const text = (inputEl?.value || '').trim();
  const hasTimeHint = /\b\d{1,2}(:\d{2})?\s*(am|pm)?\b/i.test(text);
  const hasIntent = /(remind|reminder|today|tomorrow|every|daily|weekly|monthly|at\s|on\s)/i.test(text);

  if (text.length < 8 || (!hasTimeHint && !hasIntent)) {
    evt.preventDefault();
    window.alert("Please enter a valid reminder, for example: 'Remind me to drink water at 9 PM'.");
    if (inputEl) {
      inputEl.focus();
    }
  }
});

{% if error_message %}
window.setTimeout(function () {
  window.alert({{ error_message|escapejs }});
}, 0);
{% endif %}
</script>
