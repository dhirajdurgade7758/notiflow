<form method="post" 
      hx-post="{% url 'smart-reminder-modal' %}" 
      hx-target="#modal-content" 
      hx-swap="innerHTML"
      hx-indicator="#btn-generate"> {% csrf_token %}
  
  <div class="modal-header border-0">
    <div class="w-100">
      <h5 class="modal-title text-gradient d-flex align-items-center">
        <i class="bi bi-magic me-2"></i> Smart Reminder Assistant
      </h5>
      <p class="text-muted small mb-0">Describe your reminder in natural language</p>
    </div>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>
  
  <div class="modal-body py-3">
    {% if error_message %}
      <div class="alert alert-danger d-flex align-items-start" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2 mt-1"></i>
        <div>{{ error_message }}</div>
      </div>
    {% endif %}

    <!-- Voice Status Display -->
    <div id="voice-status" class="alert alert-info d-none mb-3" role="alert">
      <small id="status-text"></small>
    </div>

    <!-- Voice Transcript Display -->
    <div id="voice-transcript" class="d-none mb-3 p-2 bg-light rounded">
      <small class="text-muted">📝 Transcribed:</small>
      <div id="transcript-text" class="mt-1 text-dark"></div>
    </div>

    <div class="form-floating mb-3">
      <textarea name="input" class="form-control" 
                placeholder="e.g., Remind me to take medicine every night at 9 PM in a gentle tone"
                style="height: 120px"
                id="smart-input"
                required>{{ input_value|default:'' }}</textarea>
      <label>Describe your reminder...</label>
    </div>

    <!-- Mic Button & Instructions -->
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <i class="bi bi-lightbulb text-warning me-2"></i>
        <small class="text-muted">Type or click 🎤 to speak</small>
      </div>
      <button type="button" id="voice-mic-btn" class="btn btn-outline-primary btn-sm">
        <i class="bi bi-mic"></i> Speak
      </button>
    </div>
  </div>
  
  <div class="modal-footer border-0 d-flex justify-content-between">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
      Cancel
    </button>

    <button type="submit" id="btn-generate" class="btn btn-primary btn-glow position-relative">
      
      <span class="generating-indicator position-absolute top-50 start-50 translate-middle">
        <span class="spinner-border spinner-border-sm me-1" role="status"></span> Generating
      </span>
      
      <span class="generating-content">
        <i class="bi bi-stars me-1"></i> Generate
      </span>
    </button>
  </div>
</form>

<style>
  /* Modal styling */
  .modal-header .text-gradient {
    background: linear-gradient(90deg, #4e54c8, #8f94fb);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .modal-content {
    border: none;
    border-radius: 12px;
    overflow: hidden;
  }
  
  [data-bs-theme="dark"] .modal-content {
    background-color: #2a2a2a;
  }
  
  /* --- HTMX LOADING STATE LOGIC --- */

  /* 1. Default State */
  .generating-indicator {
    opacity: 0;
    pointer-events: none; /* Prevents spinner from blocking clicks/hover when hidden */
    transition: opacity 0.2s ease;
    width: 100%; /* Ensures text doesn't wrap awkwardly */
    text-align: center;
  }

  .generating-content {
    opacity: 1;
    transition: opacity 0.2s ease;
  }

  /* 2. Loading State (Applied when HTMX adds .htmx-request to the BUTTON) */
  
  /* Show Spinner */
  #btn-generate.htmx-request .generating-indicator {
    opacity: 1;
  }
  
  /* Hide Content */
  #btn-generate.htmx-request .generating-content {
    opacity: 0;
  }
  
  /* --- END LOADING LOGIC --- */
  
  /* Textarea styling */
  .form-control {
    border-radius: 8px;
    padding: 1rem;
  }
  
  .form-floating label {
    padding: 1rem;
  }

  /* Voice mic button animation */
  .animate-pulse {
    animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: .5;
    }
  }

  #voice-status {
    border-left: 4px solid #0dcaf0;
  }

  [data-bs-theme="dark"] #voice-transcript {
    background-color: #3a3a3a !important;
  }

  [data-bs-theme="dark"] #voice-transcript .text-dark {
    color: #e0e0e0 !important;
  }
</style>

<script>
console.log('📋 Smart reminder modal script loaded');

// Voice assistant is initialized in base.html
// Both direct click listeners and modal/HTMX event listeners are set up there
// This script just confirms the modal DOM is ready

document.addEventListener('shown.bs.modal', function(e) {
  const micBtn = document.getElementById('voice-mic-btn');
  if (micBtn) {
    console.log('✅ Smart reminder modal opened - voice is READY');
  }
});
</script>
