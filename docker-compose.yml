name: my-docker-project

services:
  app:
    build: .
    image: notiflow-image
    container_name: notiflow_container
    command: >
      sh -c "
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    env_file:
      - ./notiflow/.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: my_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - ./redis_data:/data

  celery:
    image: notiflow-image   # FIXED !!
    container_name: my_celery
    command: celery -A notiflow worker --pool=solo --loglevel=info
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - .:/app
    env_file:
      - ./notiflow/.env

  beat:
    image: notiflow-image   # FIXED !!
    container_name: my_beat
    command: celery -A notiflow beat --scheduler django --loglevel=info
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    env_file:
      - ./notiflow/.env

  flower:
    image: notiflow-image   # FIXED !!
    container_name: my_flower
    command: celery -A notiflow flower --basic_auth=admin:password123
    ports:
      - "5555:5555"
    depends_on:
      - redis
    env_file:
      - ./notiflow/.env

volumes:
  postgres_data:
  redis_data:
